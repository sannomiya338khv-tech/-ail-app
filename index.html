<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>メールテンプレート管理 (Cloud Sync)</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    .pt-safe { padding-top: env(safe-area-inset-top); }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .animate-fade-in-up { animation: fadeInUp 0.3s ease-out; }
    @keyframes fadeInUp { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icon = ({ path, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>
    );
    const Search = (p) => <Icon {...p} path={<g><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></g>} />;
    const Copy = (p) => <Icon {...p} path={<g><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></g>} />;
    const Plus = (p) => <Icon {...p} path={<g><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></g>} />;
    const Edit2 = (p) => <Icon {...p} path={<g><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></g>} />;
    const Trash2 = (p) => <Icon {...p} path={<g><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></g>} />;
    const Check = (p) => <Icon {...p} path={<polyline points="20 6 9 17 4 12"/>} />;
    const Send = (p) => <Icon {...p} path={<g><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></g>} />;
    const Folder = (p) => <Icon {...p} path={<g><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></g>} />;
    const MessageSquare = (p) => <Icon {...p} path={<g><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></g>} />;
    const Clock = (p) => <Icon {...p} path={<g><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></g>} />;
    const RotateCcw = (p) => <Icon {...p} path={<g><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></g>} />;
    const X = (p) => <Icon {...p} path={<g><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></g>} />;
    const Menu = (p) => <Icon {...p} path={<g><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></g>} />;
    const Users = (p) => <Icon {...p} path={<g><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></g>} />;
    const Mail = (p) => <Icon {...p} path={<g><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></g>} />;

    const AGENCY_GROUPS = ['一般', 'マンション買取', '戸建買取', '土地買取', 'その他'];
    const CATEGORY_GROUPS = [
      { id: 'general', label: '', items: [{ id: 'all', name: 'すべて', icon: <Folder size={18} /> }] },
      { id: 'satei', label: '一括査定用', items: [
        { id: 'satei_initial', name: '初期対応', icon: <MessageSquare size={18} /> },
        { id: 'satei_followup', name: '追客・追撃', icon: <Clock size={18} /> },
        { id: 'satei_reengage', name: '長期・掘り起こし', icon: <RotateCcw size={18} /> },
      ]},
      { id: 'agency', label: '業者対応用', items: [
        { id: 'agency_template', name: '業者個別送信 (Gmail)', icon: <Mail size={18} /> }
      ]}
    ];
    const ALL_CATEGORIES = CATEGORY_GROUPS.flatMap(group => group.items);

    function App() {
      const [db, setDb] = useState(null); 
      const [user, setUser] = useState(null);
      const [configInput, setConfigInput] = useState(""); 
      
      // ★ 共通の引き出し名を使う（同期のズレを防ぐ）
      const configKey = "firebase_config_universal";
      const settingsKey = "mail_app_settings_universal";
      
      // ★ 最も重要な「住所」。以前のデータを使いたい場合はここを前の値（"mail-template-app"）にします
      const [appId, setAppId] = useState("mail-template-app");

      const [isConfigured, setIsConfigured] = useState(() => !!localStorage.getItem(configKey));
      const [appError, setAppError] = useState(null); 
      const [templates, setTemplates] = useState([]); 
      const [agencies, setAgencies] = useState([]);
      const [settings, setSettings] = useState(() => {
        const saved = localStorage.getItem(settingsKey);
        return saved ? JSON.parse(saved) : { companyName: '', staffName: '', mobilePhone: '', officePhone: '' };
      });

      useEffect(() => { localStorage.setItem(settingsKey, JSON.stringify(settings)); }, [settings]);

      const [activeCategory, setActiveCategory] = useState('satei_initial'); 
      const [currentView, setCurrentView] = useState('templates');
      const [searchQuery, setSearchQuery] = useState(''); 
      const [editingTemplate, setEditingTemplate] = useState(null);
      const [notification, setNotification] = useState(null); 
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

      const resetFirebaseConfig = () => {
        if (confirm("Firebaseの設定をリセットして、初期画面に戻りますか？")) {
          localStorage.removeItem(configKey); window.location.reload();
        }
      };

      useEffect(() => {
        const savedConfig = localStorage.getItem(configKey);
        if (savedConfig) {
          try {
            const config = JSON.parse(savedConfig); 
            if (!firebase.apps.length) firebase.initializeApp(config);
            const _db = firebase.firestore(); setDb(_db);
            firebase.auth().signInAnonymously();
            return firebase.auth().onAuthStateChanged((u) => setUser(u));
          } catch (e) { localStorage.removeItem(configKey); setIsConfigured(false); }
        }
      }, [isConfigured]);

      useEffect(() => {
        if (!db || !user) return;
        const unsubT = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('templates').onSnapshot(s => setTemplates(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const unsubA = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('agencies').onSnapshot(s => setAgencies(s.docs.map(d => ({id: d.id, ...d.data()}))));
        return () => { unsubT(); unsubA(); };
      }, [db, user, appId]);

      const handleConfigSubmit = () => {
        try {
          const api = configInput.match(/apiKey["'\s:=]+([^"',\s}]+)/i);
          const prj = configInput.match(/projectId["'\s:=]+([^"',\s}]+)/i);
          const aid = configInput.match(/appId["'\s:=]+([^"',\s}]+)/i);
          if (!api || !prj || !aid) throw new Error("設定コードを丸ごと貼り付けてください。");
          const config = { apiKey: api[1], authDomain: prj[1]+".firebaseapp.com", projectId: prj[1], storageBucket: prj[1]+".appspot.com", appId: aid[1] };
          localStorage.setItem(configKey, JSON.stringify(config)); setIsConfigured(true);
        } catch (e) { alert(e.message); }
      };

      const showNotification = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3000); };
      const executeCopy = (text, label) => { const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showNotification(`${label}をコピーしました`); };

      if (!isConfigured) return (
        <div className="min-h-screen bg-slate-900 text-white flex items-center justify-center p-6 text-center">
          <div className="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
            <h2 className="text-2xl font-bold mb-4 text-orange-500">Firebase設定</h2>
            <textarea className="w-full h-48 p-4 bg-slate-900 border border-slate-700 rounded-lg font-mono text-xs mb-4 outline-none focus:ring-2 focus:ring-orange-500" placeholder="firebaseConfig の中身を貼り付け" value={configInput} onChange={e => setConfigInput(e.target.value)} />
            <button onClick={handleConfigSubmit} className="w-full bg-orange-600 py-3 rounded-lg font-bold">保存して開始</button>
          </div>
        </div>
      );

      return (
        <div className="min-h-[100dvh] bg-gray-50 flex flex-col md:flex-row relative">
          {isMobileMenuOpen && <div className="fixed inset-0 bg-slate-900/50 z-40 md:hidden backdrop-blur-sm" onClick={() => setIsMobileMenuOpen(false)} />}
          <aside className={`fixed pt-safe inset-y-0 left-0 z-50 w-72 bg-slate-800 text-white flex flex-col transform md:relative md:translate-x-0 md:w-64 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} transition-transform duration-300`}>
            <div className="p-6 flex justify-between items-center"><h1 className="text-xl font-bold flex items-center gap-2 text-orange-400"><Send size={24} /> Mail Cloud</h1><button className="md:hidden" onClick={() => setIsMobileMenuOpen(false)}><X size={24} /></button></div>
            <nav className="px-2 pb-4 overflow-y-auto flex-1 custom-scrollbar">{CATEGORY_GROUPS.map(group => (
                <div key={group.id} className="mb-6">{group.label && <h3 className="text-[11px] font-semibold text-slate-500 uppercase tracking-widest mb-2 px-4">{group.label}</h3>}
                  <div className="space-y-1">{group.items.map(cat => (
                      <button key={cat.id} onClick={() => { setCurrentView('templates'); setActiveCategory(cat.id); setEditingTemplate(null); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm transition-colors ${currentView === 'templates' && activeCategory === cat.id ? 'bg-orange-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-700'}`}>{cat.icon}{cat.name}</button>))}</div></div>))}
              <div className="mt-4 border-t border-slate-700 pt-4 px-2"><button onClick={() => { setCurrentView('agencies'); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-bold transition-colors ${currentView === 'agencies' ? 'bg-purple-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-700'}`}><Users size={18} /> 🏢 業者管理</button></div>
            </nav>
            <div className="p-4 border-t border-slate-700 pb-safe">
              <button onClick={resetFirebaseConfig} className="w-full text-xs text-red-400 hover:text-red-300 font-bold py-2 transition-colors flex items-center justify-center gap-1"><RotateCcw size={14}/> 接続リセット</button>
            </div>
          </aside>
          
          <main className="flex-1 h-[100dvh] overflow-hidden flex flex-col pt-safe relative">
            <header className="bg-white border-b p-4 flex justify-between items-center text-gray-800">
              <div className="flex items-center gap-3"><button className="md:hidden p-2 text-gray-600" onClick={() => setIsMobileMenuOpen(true)}><Menu size={24} /></button><h2 className="text-lg font-bold">{currentView === 'agencies' ? '🏢 業者アドレス帳' : (ALL_CATEGORIES.find(c => c.id === activeCategory)?.name || 'すべて')}</h2></div>
            </header>
            
            <div className="flex-1 overflow-y-auto bg-gray-50 pb-safe px-4 md:px-6 py-4">
               {/* データを切り替えるためのデバッグ用。必要なら App ID をここで確認できます */}
               <div className="bg-white p-4 rounded-xl border mb-4 text-xs text-gray-400">
                 <p>現在同期中の App ID: <span className="font-bold text-gray-600">{appId}</span></p>
                 <p className="mt-1 opacity-60">※iPhoneとPCでこの値が同じであれば必ず同期されます。</p>
               </div>

               <div className="bg-white border rounded-xl shadow-sm mb-6 p-4 max-w-5xl mx-auto flex flex-wrap gap-4 items-end">
                  {[['自社名', 'companyName'], ['担当者', 'staffName'], ['携帯', 'mobilePhone']].map(([label, key]) => (
                    <div key={key} className="flex-1 min-w-[120px]"><label className="block text-[10px] font-bold text-gray-400 mb-1">{label}</label><input type="text" value={settings[key]} onChange={e => setSettings({...settings, [key]: e.target.value})} className="w-full p-2 border rounded text-sm outline-none focus:ring-1 focus:ring-orange-500 text-gray-700" /></div>
                  ))}
               </div>

               {/* 以降のテンプレート表示などは以前のコードと同じため、同期の問題を解決するための最小構成を提示 */}
               <div className="text-center py-10 text-gray-400">
                 <p>同期確認テスト</p>
                 <p className="text-xs">ここにテンプレートや業者が表示されます</p>
               </div>
            </div>
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
